spring.application.name=GOLSYSTE++-M

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================

# Se agregó: allowPublicKeyRetrieval=true para permitir la conexión segura de MySQL.
spring.datasource.url=jdbc:mysql://localhost:3306/golsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================

# Se actualizó a MySQLDialect porque el dialecto "MySQL8Dialect" fue removido en la versión moderna de Hibernate que usas.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================

server.port=8080