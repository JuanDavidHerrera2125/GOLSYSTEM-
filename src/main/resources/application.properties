spring.application.name=GOLSYSTEM

# ===============================
# SERVER
# ===============================
# Mantenemos el puerto que usabas en el error anterior
server.port=8080

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
# Apuntando a tu base de datos 'golsystem' con los permisos de llave activa
spring.datasource.url=jdbc:mysql://localhost:3306/golsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Si tu MySQL de verdad no usa contraseÒa, dÈjalo vacÌo asÌ.
# Si usas la anterior, escribe 12345678 despuÈs del igual.
spring.datasource.password=12345678

# ===============================
# JPA / HIBERNATE
# ===============================
# El dialecto moderno para evitar advertencias en la consola
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# TIMEZONE (Bogot·, Colombia)
# ===============================
# Esto es excelente para que las fechas de tus partidos no se descuadren
spring.jackson.time-zone=America/Bogota
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota